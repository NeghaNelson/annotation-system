name: Code Quality and Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          pip install flake8 pylint bandit

      - name: Run Python linter
        run: |
          flake8 backend --max-line-length=100 --ignore=E203,W503 || true
          pylint backend/annotation/*.py --disable=all --enable=E,F || true
          bandit -r backend -v || true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Node dependencies
        run: cd frontend && npm install

      - name: Run ESLint
        run: cd frontend && npm run lint || true

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check Python dependencies
        run: |
          pip install pip-audit
          pip-audit --desc backend/requirements.txt || true

      - name: Check Node dependencies
        run: |
          cd frontend && npm audit --audit-level=moderate || true
